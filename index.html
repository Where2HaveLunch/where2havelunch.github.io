<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family: "Helvetica Neue", Arial, sans-serif;
    background:#ffffff;
    color:#333;
    line-height:1.75;
}

/* 链接 */

a{
    color:#2b7bb9;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* 页面整体 */

.container{
    width:90%;
    max-width:1200px;
    margin:0 auto;
}

/* 顶部区域 */

header{
    padding-top:50px;
    padding-bottom:30px;
}

/* 整体布局 */

.hero{
    display:flex;
    align-items:flex-start;
    gap:70px;
}

/* 左侧栏 */

.sidebar{
    width:260px;
    flex-shrink:0;
}

/* 头像 */

.hero-image{
    width:220px;
    margin-bottom:25px;
}

.hero-image img{
    width:220px;
    height:300px;
    object-fit:cover;

    border-radius:50% / 35%;

    border:1px solid #e5e7eb;
}

/* 姓名 */

.sidebar h1{
    font-size:20px;
    font-weight:700;
    color:#333;
    margin-bottom:15px;
}

/* 联系方式 */

.contact{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.contact a{
    color:#444;
    font-size:16px;
}

.contact a:hover{
    color:#2b7bb9;
}

/* 右侧正文 */

.main-content{
    flex:1;
    min-width:0;
}

/* 顶部介绍 */

.intro h2{
    font-size:48px;
    font-weight:700;
    color:#333;
    margin-bottom:18px;
}

.intro p{
    font-size:18px;
    color:#555;
    margin-bottom:28px;
}

/* section */

section{
    margin-top:50px;
}

/* 标题 */

section h3{
    font-size:24px;
    font-weight:700;
    color:#333;

    padding-bottom:10px;
    margin-bottom:20px;

    border-bottom:1px solid #e5e7eb;
}

/* 正文 */

section p,
section li{
    font-size:18px;
    color:#444;
}

ul{
    padding-left:28px;
}

li{
    margin-bottom:16px;
}

/* 不使用卡片 */

.card{
    background:none;
    padding:0;
    border-radius:0;
    box-shadow:none;
}

/* News */

.news-item{
    margin-bottom:12px;
}

/* 手机端 */

@media(max-width:768px){

    .hero{
        flex-direction:column;
        gap:40px;
    }

    .sidebar{
        width:100%;
        text-align:center;
    }

    .hero-image{
        margin:0 auto 25px auto;
    }

    .main-content{
        width:100%;
    }

    .intro h2{
        font-size:36px;
    }

    .intro p,
    section p,
    section li{
        font-size:16px;
    }
}

</style>
